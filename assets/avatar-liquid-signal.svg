    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 360) rotate(90) scale(320)">
      <stop offset="0" stop-color="#8CFBFF" stop-opacity="0.92"/>
