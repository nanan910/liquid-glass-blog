<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1080" y2="1120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07101E"/>
      <stop offset="0.5" stop-color="#0B1630"/>
      <stop offset="1" stop-color="#040711"/>
    </linearGradient>
    <linearGradient id="ring" x1="260" y1="180" x2="930" y2="970" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#52F3FF"/>
      <stop offset="0.32" stop-color="#8A70FF"/>
      <stop offset="0.68" stop-color="#FF4ECD"/>
      <stop offset="1" stop-color="#9CFF54"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(610 500) rotate(90) scale(500)">
      <stop offset="0" stop-color="#DFFBFF" stop-opacity="0.95"/>
      <stop offset="0.25" stop-color="#63F5FF" stop-opacity="0.9"/>
      <stop offset="0.52" stop-color="#A05EFF" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#09101F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pinkGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(840 360) rotate(90) scale(300)">
      <stop offset="0" stop-color="#FF84E2" stop-opacity="0.95"/>
