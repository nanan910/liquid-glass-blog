      <path d="M596 355C522 355 463 416 463 488C463 538 491 584 541 609C563 620 580 642 580 667V700H616V667C616 642 633 620 655 609C706 584 735 538 735 488C735 416 675 355 596 355Z" fill="#07111F" fill-opacity="0.2"/>
      <path d="M444 792C472 742 522 714 600 714C678 714 729 742 756 792" stroke="rgba(255,255,255,0.26)" stroke-width="5" stroke-linecap="round"/>
