      <path d="M520 438C551 416 582 405 614 405C645 405 676 416 706 438" stroke="#E8FFFF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
      <path d="M510 585C535 610 565 622 600 622C635 622 666 610 690 585" stroke="#E8FFFF" stroke-width="3.5" stroke-linecap="round" opacity="0.42"/>
